name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          JWT_SECRET: test-jwt-secret-ci
          RESET_PASSWORD_TOKEN_SECRET: test-reset-ci
          VERIFICATION_TOKEN_SECRET: test-verify-ci
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS0xMjM0NTY3ODkwMTI=
          STATE_SECRET: test-state-secret-ci
        run: python -m pytest tests/ -v --tb=short --cov=src --cov-report=json

      - name: Upload backend coverage
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.json

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Upload frontend coverage
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/coverage-summary.json

  coverage-badge:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend-cov

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend-cov

      - name: Calculate combined coverage
        id: coverage
        run: |
          BE=$(python3 -c "import json; d=json.load(open('backend-cov/coverage.json')); print(round(d['totals']['percent_covered'], 1))")
          FE=$(python3 -c "import json; d=json.load(open('frontend-cov/coverage-summary.json')); print(round(d['total']['lines']['pct'], 1))")
          COMBINED=$(python3 -c "print(round(($BE + $FE) / 2, 1))")
          echo "backend=$BE" >> $GITHUB_OUTPUT
          echo "frontend=$FE" >> $GITHUB_OUTPUT
          echo "combined=$COMBINED" >> $GITHUB_OUTPUT
          echo "Coverage — Backend: ${BE}% | Frontend: ${FE}% | Combined: ${COMBINED}%"

      - name: Update coverage badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 12fc5b2b2a177811ac569e9958f2002f
          filename: coverage-badge.json
          label: coverage
          message: ${{ steps.coverage.outputs.combined }}%
          valColorRange: ${{ steps.coverage.outputs.combined }}
          minColorRange: 0
          maxColorRange: 100
          namedLogo: pytest
