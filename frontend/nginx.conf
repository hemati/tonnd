server {
    listen 5173;
    root /usr/share/nginx/html;
    index index.html;

    # Favicon fallback
    location = /favicon.ico {
        rewrite ^ /tonnd-icon.svg last;
    }

    # Frontend route — must be before /auth/ proxy
    location = /auth/callback {
        try_files /index.html =404;
    }

    # Static text files (IndexNow key, llms.txt, etc.) — serve before SPA fallback
    location ~* \.(txt)$ {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # security.txt — serve static file
    location = /.well-known/security.txt {
        add_header Cache-Control "public, max-age=86400";
    }

    # MCP + OAuth discovery — forward to backend
    location /.well-known/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /mcp/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API proxy — forward to backend container
    location ~ ^/(api|auth|users|health|docs|openapi\.json) {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback — try exact file, then directory index, then SPA root
    location / {
        try_files $uri $uri/index.html /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Hashed static assets — immutable cache
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Static files
    location ~* \.(svg|ico|png|jpg|webp|woff2|woff|ttf)$ {
        add_header Cache-Control "public, max-age=86400";
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;
}
